# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/input/forwarder/fluentbit/regulate/schema.json

# 🔟❎ 'run' Fluent Bit regulator configuration

# Configure an input that reads events from a Fluent Bit forwarder and
# an output that writes regulated TenXObjects back to Fluent Bit.
# When 'rateRegulatorOptimize' is enabled, events are encoded for volume reduction.

# This config file operates in conjunction with the instructions provided in:
# https://doc.log10x.com/run/input/forwarder/fluentbit/regulate/#install

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  # Include regulator output options (encodeObjects, outputFields, outputEncodeType)
  - run/modules/input/forwarder/fluentbit/regulate/module.yaml

  # Include the stdin input to read events from the forwarder
  - run/modules/input/forwarder/fluentbit/input

  # Include forward output to write events into the forwarder
  # Windows: Forward protocol over TCP (port 24224) - Unix: Forward protocol over Unix domain socket
  - '$="run/modules/input/forwarder/fluentbit/output/" + (TenXString.includes(TenXEnv.get("os.name"), "Windows") ? "forward" : "unix")'

# ============================= Fluent Bit Options ============================

fluentbit:
  # 'encodeObjects' controls output encoding. Defaults to the value of 'rateRegulatorOptimize':
  #  when optimize is enabled, events are encoded using encode() for volume reduction;
  #  otherwise, events are emitted in their original form via the fullText field.
  encodeObjects: $=TenXEnv.get("rateRegulatorOptimize", false)

  # 'outputFields' specifies TenXObject field names to emit alongside the main event.
  #  When set, enrichment fields are included in the sidecar output for forwarder post-processing.
  #  Example: outputFields: [level, group, symbolMessage]
  outputFields: []

  # 'outputEncodeType' controls the output format when outputFields is set.
  #  Possible values: 'json' or 'delimited'
  outputEncodeType: delimited
