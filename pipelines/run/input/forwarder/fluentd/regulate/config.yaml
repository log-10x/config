# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/input/forwarder/fluentd/regulate/schema.json

# 🔟❎ 'run' Fluentd reducer configuration

# Configure an input that reads events from a Fluentd forwarder and
# an output that writes regulated TenXObjects back to Fluentd.
# When 'reducerOptimize' is enabled, events are encoded for volume reduction.

# This config runs in conjunction with the instructions provided in:
# https://doc.log10x.com/run/input/forwarder/fluentd/regulate/#install

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  - run/modules/input/forwarder/fluentd/regulate/module.yaml

  # Include the stdin input from which to read events from the forwarder
  - run/modules/input/forwarder/fluentd/input

  # Include Unix domain socket/stdout to write events into the forwarder
  - '$="run/modules/input/forwarder/fluentd/output/" + (TenXString.includes(TenXEnv.get("os.name"), "Windows") ? "stdio" : "unix")'

# =============================== Mode Options ================================

# See fluentbit/regulate/config.yaml for the full explanation of this dispatch.
# Summary: reducerOptimize=true → compact-all; compactReducerLookupFile=<p> → compact-lookup.

outputEncodeField: '$=yield TenXEnv.get("compactReducerLookupFile") ? "encoded=shouldEncode() ? encode() : fullText" : (TenXEnv.get("reducerOptimize") ? "encoded=encode()" : "fullText")'

outputWriteTemplates: $=yield TenXEnv.get("reducerOptimize", false) || TenXEnv.get("compactReducerLookupFile", false)

# Legacy flag retained for fluentd/stdio (which emits TSV with joinFields and
# can't cleanly use outputEncodeField). fluentd/unix uses outputEncodeField.
encodeObjects: $=yield TenXEnv.get("reducerOptimize", false) || TenXEnv.get("compactReducerLookupFile", false)

# ============================== Fluentd Options ==============================

fluentd:

  # 'outputFields' specifies TenXObject field names to emit alongside the main event.
  #  When set, enrichment fields are included in the sidecar output for forwarder post-processing.
  #  Example: outputFields: [level, group, symbolMessage]
  outputFields: []

  # 'outputEncodeType' controls the output format when outputFields is set.
  #  Possible values: 'json' or 'delimited'
  outputEncodeType: delimited
