# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/input/forwarder/fluentd/sidecar/schema.json

# 🔟❎ 'run' Fluentd Sidecar receiver configuration
#
# Wires Log10x as a peer process to Fluentd using the native Fluent Forward
# protocol on both sides. Fluentd `out_forward` sends events in; Log10x's
# Fluentd Forward output sends processed events back to a Fluentd
# `in_forward` source. There is no `exec_filter`, no subprocess management,
# and no Lua — so this works against any stock Fluentd build (including
# td-agent / fluent-package) and any official Helm chart via a pure values
# overlay.
#
# For the alternative subprocess topology (Log10x launched by Fluentd's
# exec_filter) see `../embedded/config.yaml`.
#
# Architecture (TCP — the Windows-friendly default; switch to Unix sockets
# via `forwardInputPath` / `fluentdSidecarAddress` on Linux):
#
#   Fluentd out_forward (→ :24224) ──► Log10x forward input
#                                         │
#                                         ▼
#                                      Receiver
#                                         │
#                                         ▼
#   Fluentd in_forward (← :24225) ◄── Log10x Fluentd Forward output
#
# On the Fluentd side the `in_forward` source MUST route to a dedicated
# `@label` (e.g. `@OUTPUT`) so processed events bypass the enrichment
# filter chain on the return path. Recipe at:
#   modules/pipelines/run/modules/input/forwarder/fluentd/conf/tenx-sidecar.conf
#
# Usage:
#   tenx @run/input/forwarder/fluentd/sidecar @apps/receiver

tenx: run

# =============================== Dependencies ================================

include:

  # Shared forwarder options (outputEncodeField, outputWriteTemplates)
  - run/modules/input/forwarder/module.yaml

  # Shared Fluentd options (fluentdOutputFields, fluentdOutputEncodeType)
  - run/modules/input/forwarder/fluentd/module.yaml

  # Sidecar-mode module marker
  - run/modules/input/forwarder/fluentd/sidecar/module.yaml

  # Generic Forward protocol input (TCP or Unix socket)
  - run/modules/input/forward

  # Fluentd-flavored Forward protocol output wrapper. Configures the
  # outbound side based on the `fluentdSidecar*` options below — no
  # inline output declaration needed in this file.
  - run/modules/input/forwarder/fluentd/output/forward

# =============================== Mode Options ================================
#
# receiverOptimize=true → compact-all encoding; otherwise plain passthrough.
outputEncodeField: $=yield TenXReceiver.encodeField()
outputWriteTemplates: $=yield TenXReceiver.writeTemplates()

# ============================== Forward Input ================================
#
# TCP port on which Log10x listens for Fluent Forward protocol traffic from
# Fluentd's `out_forward` plugin. Override with:
#   -forwardInputPort 9999            (different TCP port)
#   -forwardInputPath /tmp/in.sock    (Unix socket; takes precedence over TCP)
forwardInputPort: 24224

# ============================== Forward Output ===============================
#
# The Fluentd Forward output wrapper included above defaults to TCP
# 127.0.0.1:24225 so it does not collide with the input port. To override:
#
#   outputForwardHostAddress: 0.0.0.0
#   outputForwardHostPort:    9999
#
# Or on Linux/macOS, prefer a Unix socket:
#
#   outputForwardAddress:     /tmp/tenx-fluentd-out.sock
#
# The Fluentd tag is preserved across the round trip: the forward input
# extracts the incoming tag as the event's `source` field, and the forward
# output uses `source` as the outgoing tag — so destinations that route by
# `$TAG` (Splunk index, S3 path, Kafka topic, etc.) see the same value
# they would have seen without Log10x in the path.
