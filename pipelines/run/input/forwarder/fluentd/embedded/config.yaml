# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/input/forwarder/fluentd/embedded/schema.json

# 🔟❎ 'run' Fluentd Embedded receiver configuration
#
# Embedded topology — Log10x runs as a child process of Fluentd via the
# `exec_filter` plugin. Events are piped on stdin; processed events return
# via stdout (Windows) or a Unix domain socket (Linux/macOS). Fluentd
# manages the Log10x process lifecycle.
#
# For the alternative peer-process topology (recommended for k8s and any
# Helm-chart-based deployment), see `../sidecar/config.yaml`.

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  # Parent module declaring shared forwarder options (outputEncodeField, outputWriteTemplates, encodeObjects)
  - run/modules/input/forwarder/module.yaml

  # Shared Fluentd options (fluentdOutputFields, fluentdOutputEncodeType)
  - run/modules/input/forwarder/fluentd/module.yaml

  # Embedded-mode module marker
  - run/modules/input/forwarder/fluentd/embedded/module.yaml

  # Include the stdin input from which to read events from the forwarder
  - run/modules/input/forwarder/fluentd/input

  # Include Unix domain socket/stdout to write events into the forwarder
  - '$="run/modules/input/forwarder/fluentd/output/" + (TenXString.includes(TenXEnv.get("os.name"), "Windows") ? "stdio" : "unix")'

# =============================== Mode Options ================================

# See fluentbit/receive/config.yaml for the full explanation of this dispatch.
# Summary: receiverOptimize=true → compact-all; compactReceiverLookupFile=<p> → compact-lookup.

outputEncodeField: $=yield TenXReceiver.encodeField()

outputWriteTemplates: $=yield TenXReceiver.writeTemplates()

# Legacy flag retained for fluentd/stdio (which emits TSV with joinFields and
# can't cleanly use outputEncodeField). fluentd/unix uses outputEncodeField.
encodeObjects: $=yield TenXReceiver.writeTemplates()
