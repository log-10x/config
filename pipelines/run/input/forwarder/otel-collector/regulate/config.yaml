# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/input/forwarder/otel-collector/regulate/schema.json

# 🔟❎ 'run' OpenTelemetry Collector reducer configuration
#
# Configure an input that reads events from OpenTelemetry Collector via syslog
# and an output that writes regulated TenXObjects back via Forward protocol.
# When 'reducerOptimize' is enabled, events are encoded for volume reduction.
#
# Architecture:
#   OTel Collector --[syslog/unix]--> Log10x Reducer --[forward/unix]--> OTel Collector --> Final destinations
#
# Usage:
#   tenx run @run/input/forwarder/otel-collector/regulate @apps/reducer

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  # Parent module declaring shared forwarder options (outputEncodeField, outputWriteTemplates, encodeObjects)
  - run/modules/input/forwarder/module.yaml

  - run/modules/input/forwarder/otel-collector/regulate/module.yaml

  # Read events from OTel Collector via Unix socket with syslog parsing
  - run/modules/input/forwarder/otel-collector/input

  # Write filtered events back to OTel Collector via Forward protocol
  - run/modules/input/forwarder/otel-collector/output/unix

# =============================== Mode Options ================================

# See fluentbit/regulate/config.yaml for the full explanation of this dispatch.

outputEncodeField: '$=yield TenXEnv.get("compactReducerLookupFile") ? "encoded=shouldEncode() ? encode() : fullText" : (TenXEnv.get("reducerOptimize") ? "encoded=encode()" : "fullText")'

outputWriteTemplates: $=yield TenXEnv.get("reducerOptimize", false) || TenXEnv.get("compactReducerLookupFile", false)

encodeObjects: $=yield TenXEnv.get("reducerOptimize", false) || TenXEnv.get("compactReducerLookupFile", false)

# ========================= Configuration Options =============================

otelCollector:

  # 'outputFields' specifies TenXObject field names to emit alongside the main event.
  #  When set, enrichment fields are included in the sidecar output for forwarder post-processing.
  #  Example: outputFields: [level, group, symbolMessage]
  outputFields: []

  # 'outputEncodeType' controls the output format when outputFields is set.
  #  Possible values: 'json' or 'delimited'
  outputEncodeType: delimited
