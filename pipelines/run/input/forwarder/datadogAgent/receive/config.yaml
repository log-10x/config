# yaml-language-server: $schema=schema.json

# 🔟❎ 'run' Datadog Agent reducer configuration

# Configure an input that reads events from a Fluent Bit forwarder and
# an output that writes filtered TenXObjects to a file relay for Datadog Agent.

# This config file operates in conjunction with the instructions provided in:
# https://doc.log10x.com/run/input/forwarder/datadogAgent/receive/#install

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:

  # Parent module declaring shared forwarder options (outputEncodeField, outputWriteTemplates, encodeObjects)
  - run/modules/input/forwarder/module.yaml

  # Include output encoding format options
  - run/modules/input/forwarder/fluentbit/output/module.yaml

  # Include the stdin input to read events from the forwarder
  - run/modules/input/forwarder/fluentbit/input

  # Include Unix domain socket / Fluent Forward (TCP) output to write events into Fluent Bit,
  # which relays them to the Datadog Agent. Mirrors the fluentbit/regulate selection.
  - '$="run/modules/input/forwarder/fluentbit/output/" + (TenXString.includes(TenXEnv.get("os.name"), "Windows") ? "forward" : "unix")'

# =============================== Mode Options ================================

# See fluentbit/regulate/config.yaml for the full explanation of this dispatch.

outputEncodeField: '$=yield TenXEnv.get("compactReducerLookupFile") ? "encoded=shouldEncode() ? encode() : fullText" : (TenXEnv.get("reducerOptimize") ? "encoded=encode()" : "fullText")'

outputWriteTemplates: $=yield TenXEnv.get("reducerOptimize", false) || TenXEnv.get("compactReducerLookupFile", false)

encodeObjects: $=yield TenXEnv.get("reducerOptimize", false) || TenXEnv.get("compactReducerLookupFile", false)
