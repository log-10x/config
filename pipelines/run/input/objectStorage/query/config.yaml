# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/input/objectStorage/query/schema.json

# 🔟❎ 'run' Object storage query AWS S3 configuration

# Configure query AWS S3 bucket settings
# To learn more see https://doc.log10x.com/run/input/objectStorage/query/

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:
  - run/modules/input/objectStorage/input
  - run/modules/input/objectStorage/query

# =============================== Query Options ===============================

query:

    # 'name' specifies a logical name associated with this query
  - name: my-query

    # 'readPrintProgress' sets whether this input prints throughput stats to the console
    readPrintProgress: $=!TenXEnv.get("quiet")

    # ---------------------------- Storage Options ----------------------------

    # 'objectStorage' selects the underlying storage (e.g., S3). To learn more see: https://doc.log10x.com/run/input/objectStorage

    # Authentication is made via the default provider credentials chain:
    # https://sdk.amazonaws.com/java/api/latest/software/amazon/awssdk/auth/credentials/DefaultCredentialsProvider.html

    # Region selection is made via the default region provider chain:
    # https://sdk.amazonaws.com/java/api/latest/software/amazon/awssdk/regions/providers/DefaultAwsRegionProviderChain.html

    objectStorageName: AWS

    # 'readContainer' specifies the container (e.g., S3 bucket) in which to search
    readContainer: $=TenXEnv.get("TENX_STREAMER_INPUT_BUCKET", "")  # (REQUIRED)

    # 'indexContainer' specifies the container (e.g., S3 bucket) in which index objects created by the 'index' module reside.
    indexContainer: $=TenXEnv.get("TENX_STREAMER_INDEX_BUCKET", "") # (REQUIRED)

    # ----------------------------- Search Options ----------------------------

    # 'target' specifies a user app/service name (e.g., 'acme-client') to search in.
    target: app          # (REQUIRED)

    # 'from' sets the query's beginning epoch time range (inclusive).
    #  The 'now' function returns the current epoch value with an optional positive/negative offset.
    from: now("-5m")   # (REQUIRED)

    # 'to' sets the end epoch time range (exclusive), must be greater than 'from'.
    to: now()          # (REQUIRED)

    # 'search' Specifies a search expression applied to raw events in the underlying storage 
    #  Supports basic operations: `&&` (AND), `||` (OR), == (equality), and includes(field, text) (substring match).
    search: (severity_level == "ERROR") || (severity_level == "FATAL")
    
    # 'id' specifies a unique query identifier. Automatically assigned if not set.
    id: ""

    # 'logLevels' specifies which log levels are sent to CloudWatch Logs for query progress tracking.
    #  Default (when empty): ERROR, INFO, PERF. Set to include DEBUG for diagnostic output.
    #  NOTE: PERF is required for console progress tracking (gauges, completion detection).
    #  Disabling it will cause the console to not detect query completion.
    logLevels: ""

    # 'logGroup' specifies the CloudWatch Logs log group for query event logging.
    #  The log group must be pre-created (e.g. by Terraform). If empty, query event logging is disabled.
    logGroup: $=TenXEnv.get("TENX_QUERY_LOG_GROUP", "")

    # 'writeResults' gates the stream pipeline's JSONL results writer, which
    #  buffers matched TenXObjects to object storage under
    #  `{indexObjectPath(queryResults)}/{queryId}/*.jsonl` alongside the
    #  byte-count marker backstop used by the query coordinator. Defaults to
    #  false so the extra JSONL upload only runs when a caller explicitly
    #  opts in. Out-of-band consumers like the Log10x MCP server pass
    #  `writeResults=true` on their query request to retrieve full event
    #  payloads from S3; other deployments leave this off to avoid the
    #  results-writer overhead.
    writeResults: false

    # 'filters' specify expressions TenXObjects transformed from matching events in storage must meet
    #  To learn more see https://doc.log10x.com/run/output/regulate/#filter-expressions
    filters: []

    # ----------------------------- Limit Options ------------------------------

    # 'limit' options caps the query's processing time and volume of results it will return
    limit:

      # 'processingTime' specifies the time in ms allotted for this query to complete.
      #  Once this period has elapsed the query will terminate regardless of
      #  whether 'resultSize' has not been exceeded.
      processingTime: parseDuration("1m")

      # 'resultSize' specifies the volume in bytes of events matching the target app name, terms and time range to fetch.
      #  Once this volume has been reached the query will terminate.
      resultSize: parseBytes("10MB")


  #  ============================== Advanced Options ========================== ##

    # ---------------------------- Scan Options -------------------------------

    # The options below control how to execute queries using parallel 'run' pipeline instances.

    # 'scanFunction' instances iterate through a target portion of the 'indexContainer'
    #  to select index objects that match the query's time range and search terms.
    #  Each index object is associated with a byte range within a blob object residing in 'readContainer'.
    #  Matching blob byte ranges are passed to a 'stream' pipeline to transform into TenXObjects
    #  to filter, enrich, aggregate and output.
    scanFunction:

      # 'limitResultSizeInterval' specifies the interval by which to check whether queryLimitResultSize is exceeded
      limitResultSizeInterval: parseDuration("5s")

      # 'parallel' configure how to scan the 'indexContainer' bucket for
      #  for matching blob byte ranges stored in the 'readContainer'
      #  using multiple instances of the 'scan' function. Matching byte ranges
      #  are processed by instances of the 'stream' function below.
      parallel:

        # 'timeslice' defines the time duration as a single instance of the pipeline function
        #  will scan within 'indexContainer'. For example, if the query's time range is 60min
        #  and 'timeslice' is set to '1m', 60 'scan' pipeline function instances will be launched in parallel.
        timeslice: parseDuration("1m")

        # 'threads' sets the max number of JVM threads launched within each instance
        #  of the 'scan' pipeline function to process the index objects read from 'indexContainer'
        #  for the 'timeslice'.
        threads: 10

        # 'maxInstances' specifies the maximum number of 'scan' function instances that will traverse the index.
        #  If the provided time range and time slice provided will result in more instances than this
        #  value, the time slice will increase its size until the amount of functions needed will be less
        #  than this value.

        # For example, if a query specifies a time range of '60min' and a time slice of '1m', while this
        # value is set to '25', the time slice will be effectively increased to '3m' to accommodate this.
        maxInstances: 100

      # 'url' points to the URL used to access the 'scan' pipeline function as a REST endpoint.
      # When combined with additional params in 'objectStorageArgs', can also be used to invoke
      # lambdas or post SQS messages.
      url: $=TenXEnv.get("TENX_INVOKE_PIPELINE_SCAN_ENDPOINT", "http://localhost:8080/pipeline")

    # ---------------------------- Stream Options -----------------------------

    # 'streamFunction' options controls how matching blob byte ranges residing
    #  in the 'readContainer' are passed to 'stream' functions to
    #  transform events matching the query's filter into TenXObjects on which to perform the query's actions.

    streamFunction:

      # 'parallel' configure how matching blob byte ranges are processed
      #  by multiple instances of the 'stream' function.
      parallel:

        # 'objects' sets the max number of object storage 'get' operations a single instance of the 'stream' function makes.
        #  For example, if the 'scan' function identifies 500 matching blob byte ranges,
        #  and 'objects' is set to 100, 5 instances of the 'stream' function will fetch and process the matching blobs.
        objects: $=parseInt(TenXEnv.get("TENX_STREAM_PARALLEL_OBJECTS", 100))

        # 'byteRange' defines the max byte range a single object storage 'get' operation can retrieve.
        #  For example, if a target blob is 1GB and contains two matching byte ranges
        #  that are 1MB in size and spaced 2 MB apart, a single 'get' operation will fetch both.
        #  In contrast, two 'get' requests are required if the byte ranges are 10MB apart.
        byteRange: parseBytes("5MB")

      # 'url' points to the URL used to access the 'stream' pipeline function as a REST endpoint.
      # When combined with additional params in 'objectStorageArgs', can also be used to invoke
      # lambdas or post SQS messages.
      url: $=TenXEnv.get("TENX_INVOKE_PIPELINE_STREAM_ENDPOINT", "http://localhost:8080/pipeline")

    # ------------------------------ Storage Options --------------------------

    # 'objectStorageArgs' provides arguments to the constructor of the class defined by 'objectStorageName'.
    # Setting [invoke, sqs] configures the storage accessor to route pipeline invocations via SQS messages.
    objectStorageArgs: [invoke, sqs]
