# yaml-language-server: $schema=schema.json

# 'run' TCP/UDP socket output configuration

# Configure a TCP or UDP socket output to write TenXObject instance and template field values.
# To learn more see https://doc.log10x.com/run/output/event/socket

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include: run/modules/output/event/socket

# ============================== Socket Options ===============================

# Multiple TCP/UDP socket outputs can be defined below
outputSocket:

  # ----------------------------- Object Output ------------------------------

    # 'writeObjects' controls whether to write TenXObject field values to output.
  - writeObjects: true

    # 'protocol' specifies the network protocol, either "TCP" (default) or "UDP"
    protocol: TCP

    # 'host' specifies the target host address
    host: $=TenXEnv.get("TENX_SOCKET_HOST", "127.0.0.1")

    # 'port' specifies the target port number
    port: $=parseInt(TenXEnv.get("TENX_SOCKET_PORT", 9999))

    # 'filter' sets a JavaScript expression that TenXObjects must evaluate as truthy to write to the output.
    #  To learn more see https://doc.log10x.com/run/output/regulate/#filter-expressions
    filter: isObject

    # 'fields' defines the fields to write for each TenXObject sent to this output.
    #  To learn more see https://doc.log10x.com/run/output/stream/#outputfields
    fields:
      - encode()

    # 'encodeType' specifies how 'fields' are encoded to output. Possible values: [json,delimited].
    encodeType: delimited

  # ---------------------------- Template Output ----------------------------

    # 'writeTemplates' controls whether to write new templates for TenXObjects written to
    #  this output. To learn more see https://doc.log10x.com/run/template
  - writeTemplates: true

    protocol: TCP
    host: $=TenXEnv.get("TENX_SOCKET_HOST", "127.0.0.1")
    port: $=parseInt(TenXEnv.get("TENX_SOCKET_PORT", 9999))
