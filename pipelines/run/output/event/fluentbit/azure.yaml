# yaml-language-server: $schema=https://schema.log10x.com/pipelines/run/output/event/fluentbit/schema.json

# 🔟❎ 'run' Fluent Bit output configuration for events stream output to Azure Monitor Logs

# Launch a Fluent Bit process into whose stdin pipe to write TenXObjects field values and TenXTemplates
# To learn more see https://doc.log10x.com/run/output/event/process/

# Set the 10x pipeline to 'run'
tenx: run

# =============================== Dependencies ================================

include:
  - run/modules/output/event/fluentbit


# ============================ Fluent Bit Options =============================

# Multiple Fluent Bit outputs can be defined below

fluentbitOut:

    # ------------------------------ General ----------------------------------

    # 'writeObjects' controls whether to write TenXObject field values to output.
  - writeObjects: true

    # 'writeTemplates' controls whether to write new template for TenXObjects written to
    #  this output. To learn more about TenXTemplates, see: https://doc.log10x.com/run/template
    writeTemplates: false

    # ------------------------------ Process ----------------------------------

    # 'command' specifies the command to execute to launch the Fluent Bit sub-process.
    command: /opt/fluent-bit/bin/fluent-bit

    # 'inputArgs' specifies list of values to pass as startup arguments to the spawned Fluent Bit sub-process
    inputArgs:
      # Sets the Fluent Bit input to read from stdin and route TenXTemplates
      # See https://github.com/log-10x/config/blob/main/pipelines/run/output/event/fluentbit/fluentbit-10x-input.conf
      - -c
      - $=path("fluentbit-10x-input.conf")

    # Setting the Fluent Bit output to Azure Monitor Logs via the Logs Ingestion API.
    # for full config options of the Fluent Bit azure_logs_ingestion plugin, see -
    # https://docs.fluentbit.io/manual/pipeline/outputs/azure_logs_ingestion
    #
    # The Logs Ingestion API sends data through a Data Collection Endpoint (DCE)
    # into a Data Collection Rule (DCR) that targets a table in a Log Analytics
    # workspace. This is the ONLY Azure Monitor path that can target a table on
    # the Basic or Auxiliary plan (the legacy HTTP Data Collector API writes
    # Analytics-plan *_CL tables only). See the tier_down note at the bottom.
    #
    # Authentication uses an Azure AD (Entra) app registration. Required env vars:
    #   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
    #   AZURE_DCE_URL           - Data Collection Endpoint logs-ingestion URI
    #   AZURE_DCR_ID            - immutable Data Collection Rule id
    #   AZURE_STREAM_NAME       - events table name, e.g. Tenx_CL. NOTE: the plugin
    #                             sends to the DCR stream Custom-<table_name>, so pass
    #                             the BARE table name (Tenx_CL), NOT Custom-Tenx_CL.
    #   AZURE_TEMPLATES_STREAM_NAME - templates table name, e.g. TenxTemplates_CL
    #
    outputArgs:
      ############### Events output ###############

      # Set event output to Azure Monitor Logs
      - "-o"
      - "azure_logs_ingestion"
      - "-m"
      - "input"

      # Azure AD app credentials (REQUIRED)
      - "-p"
      - "$=\"tenant_id=\" + TenXEnv.get(\"AZURE_TENANT_ID\")"
      - "-p"
      - "$=\"client_id=\" + TenXEnv.get(\"AZURE_CLIENT_ID\")"
      - "-p"
      - "$=\"client_secret=\" + TenXEnv.get(\"AZURE_CLIENT_SECRET\")"

      # Ingestion target: DCE + DCR + stream (REQUIRED)
      - "-p"
      - "$=\"dce_url=\" + TenXEnv.get(\"AZURE_DCE_URL\")"
      - "-p"
      - "$=\"dcr_id=\" + TenXEnv.get(\"AZURE_DCR_ID\")"
      - "-p"
      - "$=\"table_name=\" + TenXEnv.get(\"AZURE_STREAM_NAME\")"

      # Stamp TimeGenerated from the record time
      - "-p"
      - "time_generated=true"

      # Flush every second
      - "-f"
      - "1"

      ############### Templates output ###############

      # Set templates output to Azure Monitor Logs
      - "-o"
      - "azure_logs_ingestion"
      - "-m"
      - "templates"

      # Azure AD app credentials (REQUIRED)
      - "-p"
      - "$=\"tenant_id=\" + TenXEnv.get(\"AZURE_TENANT_ID\")"
      - "-p"
      - "$=\"client_id=\" + TenXEnv.get(\"AZURE_CLIENT_ID\")"
      - "-p"
      - "$=\"client_secret=\" + TenXEnv.get(\"AZURE_CLIENT_SECRET\")"

      # Ingestion target: DCE + DCR + templates stream (REQUIRED)
      - "-p"
      - "$=\"dce_url=\" + TenXEnv.get(\"AZURE_DCE_URL\")"
      - "-p"
      - "$=\"dcr_id=\" + TenXEnv.get(\"AZURE_DCR_ID\")"
      - "-p"
      - "$=\"table_name=\" + TenXEnv.get(\"AZURE_TEMPLATES_STREAM_NAME\")"

      # Stamp TimeGenerated from the record time
      - "-p"
      - "time_generated=true"

      # Flush every second
      - "-f"
      - "1"

    # 'destroyMode' is set to 'cached' to allow a fluent-bit sub-process to
    #  to be reused across multiple 10x pipeline executions within a host JVM.
    destroyMode: cached

    # 'maxCacheSize' sets the size of the cache to used for caching fluent-bit instances
    maxCacheSize: 1

    # 'lazyLaunch' determines whether the fluent-bit instance will launch immediately
    # during the pipeline initialization, or only on-demand.
    lazyLaunch: true

    # ------------------------------ Encoding ---------------------------------

    # 'filter' specifies an expression that any TenXObject passed to this output must
    #  evaluate as truthy against to write its instance/template values to stdout.
    #  For example, 'filter: this.timestamp' will only emit timestamped objects.
    #  To learn more see: https://doc.log10x.com/api/js/#TenXBaseObject+timestamped
    filter: null

    #  This corresponds to the stdin format defined by fluent-bit in:
    #  https://docs.fluentbit.io/manual/pipeline/inputs/standard-input
    #  The 'text' argument below could be replaced by any list of intrinsic/calculated/extracted fields.
    #  The "" delimiter instructs 'joinFields' to produce JSON output.
    fields:  #
      - open="["
      - timestamp=dateFormat("+%s.%N")
      - separator=","
      - fields=joinFields("", "text")
      - close="]"

# =============================== tier_down ==================================
#
# The recipe above ships every event to a single Analytics-plan table. To
# down-tier the slice the engine marks with routeState == "tier_down" (Azure's
# analog of CloudWatch Infrequent Access), route that slice to a table on the
# cheaper Basic or Auxiliary plan:
#
#   1. Pre-provision a Basic/Auxiliary-plan table + its own DCR stream. The plan
#      is a create-time table property; ingestion still goes through the same
#      DCE. See https://doc.log10x.com/apps/mcp for the generated provisioning
#      recipe (az monitor log-analytics workspace table create --plan Basic/Auxiliary).
#   2. Add a rewrite_tag rule to fluentbit-10x-input.conf keyed on the stamped
#      routeState field, e.g.:
#         [FILTER]
#             Name        rewrite_tag
#             Match       input
#             Rule        $routeState "^tier_down$" tierdown false
#   3. Add a third output block below with `-m tierdown` whose AZURE_STREAM_NAME
#      / table_name points at the Basic/Auxiliary-plan stream, while the `-m input`
#      output above keeps the Analytics-plan stream for un-marked events.
#
# HARDENING: a stamp-miss falls back to the `-m input` (Analytics) output and
# bills at the full Analytics rate; monitor Analytics-table ingest to catch
# stamp gaps. Never default un-marked traffic to the cheap plan.
