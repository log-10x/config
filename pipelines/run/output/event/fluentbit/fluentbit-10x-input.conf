# Fluentbit input configuration

# This config sets up the input as stdin and separates events from templates.
# Output configuration is intended to be added by the various concrete destination configs.

# Sets input from stdin
#
[INPUT]
    Name        stdin
    Tag         input

# Check events from the 'input' tag and rewrite them as 'templates'
# if they have a non-empty 'templateHash' field.
# This will allow routing events and templates to different outputs
#
[FILTER]
    Name        rewrite_tag
    Match       input
    Rule        $templateHash ".+" templates false
