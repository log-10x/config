# 🔟❎ 'run' MCP-app stdout output configuration
#
# Forked from `pipelines/run/output/event/stdout/config.yaml`. The MCP wrapper
# consumes a single stdout stream and demultiplexes by per-line prefix:
#   `~`        → encoded TenXObject (one per input event / multi-line group)
#   `{`        → TenXTemplate JSON
#   `summary=` → aggregated TenXSummary (one per unique enrichment-field tuple)
# Engine info lines start with emoji bytes (UTF-8 0xF0+) and are skipped.
#
# Decode output is intentionally omitted (raw event text has no discriminator
# and the MCP doesn't need it).

tenx: run

include: run/modules/output/event/stdout

stdout:

  # 10x encoding output — `~hash,val1,val2,...` per event
  - target: SYSTEM_OUT
    filter: isObject
    fields:
      - encodedPrefix="encoded="
      - encode()
      - patternPrefix="pattern="
      - $=yield TenXEnv.get("symbolMessageField")
      - patternHashPrefix="patternHash="
      - $=yield TenXEnv.get("symbolMessageHashField")


  # Template output — JSON `{"templateHash":"...","template":"..."}`
  - target: SYSTEM_OUT
    writeTemplates: true

  # Summary output — `summary=severity,pattern,vol,bytes,totals`
  - target: SYSTEM_OUT
    filter: isSummary
    fields:
      - summaryPrefix="summary="
      - $=yield TenXEnv.get("enrichmentFields")
      - summaryVolume
      - summaryBytes
      - summaryTotals
