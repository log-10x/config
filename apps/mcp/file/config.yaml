# 🔟❎ 'run' MCP-app file output configuration
#
# Forked from `pipelines/run/output/event/file/config.yaml`.
#
# Writes the three engine artifacts the MCP wrapper needs to a
# directory keyed by LOG10X_MCP_RUNTIME_NAME so multiple parallel
# invocations don't clash:
#
#   /tmp/log10x-mcp-pull/<runtime_name>/encoded.log
#       — one anchored-encoded line per input event:
#         `~hash,val,val,...,pattern=,<symbolMessage>,patternHash=,<tenxHash>`
#         The leading `~hash` is the first value of the encoded section
#         and joins back to templates.json. The `pattern=` and
#         `patternHash=` anchors correlate to aggregated.csv.
#
#   /tmp/log10x-mcp-pull/<runtime_name>/templates.json
#       — one JSON-per-line: `{"templateHash":"...","template":"..."}`
#
#   /tmp/log10x-mcp-pull/<runtime_name>/aggregated.csv
#       — one row per unique (severity, message_pattern, tenx_hash)
#         enrichment tuple. Header is the enrichmentFields list +
#         summaryVolume + summaryBytes + summaryTotals.
#
# Use case: when the input stream is too large for stdout buffering
# (POC pulls 100K-1M events from a SIEM), this output writes the
# templater results to disk. The caller reads them after the pipeline
# exits.
#
# The runtime name is set by the MCP server's invocation env, e.g.:
#   LOG10X_MCP_RUNTIME_NAME=poc-1700000000-<uuid> tenx @apps/mcp/file
#
# Defaults to "default" when unset, so a bare invocation still works.

tenx: run

include:
  - run/modules/output/event/file

outputFile:

  # --------------------------- 10x Encoded Output ---------------------------

    # One anchored-encoded line per TenXObject. The leading `~hash` is
    # the templateHash (joins to templates.json); the `pattern=` and
    # `patternHash=` anchors carry the Reporter-tier symbolMessage
    # and tenx_hash (correlate to aggregated.csv).

  - path: $="/tmp/log10x-mcp-pull/" + TenXEnv.get("LOG10X_MCP_RUNTIME_NAME", "default") + "/encoded.log"
    filter: isObject
    fields:
      - encode()
      - patternPrefix="pattern="
      - $=yield TenXEnv.get("symbolMessageField")
      - patternHashPrefix="patternHash="
      - $=yield TenXEnv.get("symbolMessageHashField")

  # ---------------------------- Template Output ----------------------------

    # JSON-per-line: {"templateHash":"...","template":"..."}
    # writeTemplates emits one entry per new TenXTemplate observed.

  - path: $="/tmp/log10x-mcp-pull/" + TenXEnv.get("LOG10X_MCP_RUNTIME_NAME", "default") + "/templates.json"
    writeTemplates: true
    append: true

  # ----------------------------- Summary Output ----------------------------

    # CSV: enrichmentFields (severity, message_pattern, tenx_hash) +
    # summaryVolume + summaryBytes + summaryTotals.
    # Filter to summary rows only — encoded events go to encoded.log.

  - path: $="/tmp/log10x-mcp-pull/" + TenXEnv.get("LOG10X_MCP_RUNTIME_NAME", "default") + "/aggregated.csv"
    header: $=yield TenXString.join(",", TenXEnv.get("enrichmentFields"), "summaryVolume", "summaryBytes", "summaryTotals") + "\n"
    filter: isSummary
    fields:
      - $=yield TenXEnv.get("enrichmentFields")
      - summaryVolume
      - summaryBytes
      - summaryTotals
