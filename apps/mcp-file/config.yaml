#
# 🔟❎ MCP file-output app
#
# Sibling of `@apps/mcp`. Same input chain (stdin), same enrichment
# (level / group / message), but writes the three engine artifacts
# to disk instead of multiplexing them on stdout:
#
#   /tmp/log10x-mcp-pull/<LOG10X_MCP_RUNTIME_NAME>/encoded.log
#   /tmp/log10x-mcp-pull/<LOG10X_MCP_RUNTIME_NAME>/templates.json
#   /tmp/log10x-mcp-pull/<LOG10X_MCP_RUNTIME_NAME>/aggregated.csv
#
# Use this when the input volume is large enough to exceed stdout
# buffering (typically POC pulls of 100K+ events from a SIEM).
#
# Intended invocation:
#
#     LOG10X_MCP_RUNTIME_NAME=poc-<unique-id> \
#       tenx @apps/mcp-file [@<user-provided-code-file>] < /path/to/events
#
# The caller (POC tool) reads the three artifacts after the CLI exits.

tenx: run

runtimeName: $=TenXEnv.get("TENX_RUNTIME_NAME", "myMcpFile")

include:

  # App settings — shared with @apps/mcp.
  - mcp

  # Input chain — stdin (the caller pipes events in).
  - run/input/stdin

  # Enrichment chain — same as @apps/mcp (level / group / message +
  # custom). Enough for template extraction and timestamp classification.
  - run/initialize/inputField
  - run/initialize/level
  - run/initialize/group
  - run/initialize/message
  - run/initialize/custom

  # Output: file variant (templates.json + encoded.log + aggregated.csv).
  - apps/mcp/file
