- apiVersion: batch/v1
  kind: CronJob
  metadata:
    creationTimestamp: "2026-04-14T14:01:06Z"
    generation: 1
    name: tenx-index-inducer
    namespace: demo
    resourceVersion: "3111975"
    uid: be4a14ed-9aeb-453a-b376-296e206822dd
  spec:
    concurrencyPolicy: Replace
    failedJobsHistoryLimit: 3
    jobTemplate:
      metadata:
        labels:
          app: tenx-index-inducer
      spec:
        backoffLimit: 6
        completions: 1
        manualSelector: false
        parallelism: 1
        template:
          metadata:
            labels:
              app: tenx-index-inducer
          spec:
            automountServiceAccountToken: true
            containers:
            - command:
              - /bin/sh
              - -c
              - |-
                set -e
                pip install --quiet boto3
                TIMESTAMP=$(date -u +%Y-%m-%d-%H-%M)
                DEST_KEY="${INDEX_PREFIX}otel-sample-${TIMESTAMP}.log"
                echo "Processing sample log with timestamp adjustment..."
                echo "Source: s3://${SOURCE_BUCKET}/${SOURCE_KEY}"
                echo "Destination: s3://${DEST_BUCKET}/${DEST_KEY}"
                python /scripts/adjust_timestamps.py --source-bucket "${SOURCE_BUCKET}" --source-key "${SOURCE_KEY}" --dest-bucket "${DEST_BUCKET}" --dest-key "${DEST_KEY}"
                echo "Successfully processed and uploaded file to trigger indexing"
              env:
              - name: SOURCE_BUCKET
                value: log10x-public-assets
              - name: SOURCE_KEY
                value: samples/otel-k8s/medium/input/otel-sample.log
              - name: DEST_BUCKET
                value: tenx-demo-cloud-streamer-351939435334
              - name: INDEX_PREFIX
                value: app/
              image: python:3.12-slim
              imagePullPolicy: IfNotPresent
              name: index-inducer
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 256Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
              - mountPath: /scripts
                mountPropagation: None
                name: script
                readOnly: true
            dnsPolicy: ClusterFirst
            enableServiceLinks: true
            nodeSelector:
              workload: cron
            restartPolicy: OnFailure
            schedulerName: default-scheduler
            securityContext: {}
            serviceAccount: tenx-demo-index-inducer
            serviceAccountName: tenx-demo-index-inducer
            shareProcessNamespace: false
            terminationGracePeriodSeconds: 30
            volumes:
            - configMap:
                defaultMode: 493
                name: tenx-index-inducer-script
                optional: false
              name: script
    schedule: '*/1 * * * *'
    successfulJobsHistoryLimit: 3
    suspend: false
  status:
    active:
    - apiVersion: batch/v1
      kind: Job
      name: tenx-index-inducer-29612145
      namespace: demo
      resourceVersion: "3111973"
      uid: 438f9065-288a-4230-8717-17514483f3a1
    lastScheduleTime: "2026-04-20T23:45:00Z"
    lastSuccessfulTime: "2026-04-20T23:44:16Z"
