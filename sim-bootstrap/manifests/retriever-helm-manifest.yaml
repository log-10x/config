spec:
  schedule: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  suspend: false
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: retriever-10x
            component: scheduled-query
            query-job-name: text-search
        spec:
          serviceAccountName: tenx-retriever
          restartPolicy: OnFailure
          containers:
            - name: send-query
              image: "amazon/aws-cli:2.15.17"
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash"]
              args:
                - -c
                - |
                  set -e
                  QUERY_BODY=$(cat <<'QUERY_EOF'
                  {"from":"$=now(\"-5m\")","name":"connection-failures","search":"severity_level==\"ERROR\" \u0026\u0026 includes(text, \"ECONNREFUSED\")","to":"$=now()"}
                  QUERY_EOF
                  )

                  echo "Sending query: connection-failures"

                  aws sqs send-message \
                    --queue-url "https://sqs.us-east-1.amazonaws.com/351939435334/tenx-demo-cloud-retriever-query-queue" \
                    --message-body "$QUERY_BODY"

                  echo "Query sent successfully: connection-failures"

                  echo "All queries sent successfully for job: text-search"
              env:
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"
          imagePullSecrets:
            - name: ghcr-secret
---
# Source: retriever-10x/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenx-retriever-retriever-10x-indexer
  labels:
    helm.sh/chart: retriever-10x-1.0.6
    app.kubernetes.io/version: "1.0.6"
    app.kubernetes.io/managed-by: Helm
    cluster: indexer
spec:

  rules:
    - host: "retriever.example.com"
      http:
        paths:
          - path: /retriever/index
            pathType: Prefix
            backend:
              service:
                name: tenx-retriever-retriever-10x-indexer
                port:
                  number: 80
          - path: /metrics/load
            pathType: Prefix
            backend:
              service:
                name: tenx-retriever-retriever-10x-indexer
                port:
                  number: 80
---
# Source: retriever-10x/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenx-retriever-retriever-10x-query-handler
  labels:
    helm.sh/chart: retriever-10x-1.0.6
    app.kubernetes.io/version: "1.0.6"
    app.kubernetes.io/managed-by: Helm
    cluster: query-handler
spec:

  rules:
    - host: "retriever.example.com"
      http:
        paths:
          - path: /retriever/query
            pathType: Prefix
            backend:
              service:
                name: tenx-retriever-retriever-10x-query-handler
                port:
                  number: 80
          - path: /metrics/load
            pathType: Prefix
            backend:
              service:
                name: tenx-retriever-retriever-10x-query-handler
                port:
                  number: 80

