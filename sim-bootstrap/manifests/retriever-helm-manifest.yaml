# Source: retriever-10x/templates/scheduled-queries.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tenx-retriever-retriever-10x-severity-filter
  labels:
    helm.sh/chart: retriever-10x-1.0.6
    app.kubernetes.io/version: "1.0.6"
    app.kubernetes.io/managed-by: Helm
    component: scheduled-query
    query-job-name: severity-filter
spec:
  schedule: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
  suspend: false
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: retriever-10x
            component: scheduled-query
            query-job-name: severity-filter
        spec:
          serviceAccountName: tenx-retriever
          restartPolicy: OnFailure
          containers:
            - name: send-query
              image: "amazon/aws-cli:2.15.17"
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash"]
              args:
                - -c
                - |
                  set -e
                  QUERY_BODY=$(cat <<'QUERY_EOF'
                  {"from":"$=now(\"-5m\")","name":"errors-and-critical","search":"severity_level==\"ERROR\" || severity_level==\"CRITICAL\"","to":"$=now()"}
                  QUERY_EOF
                  )

                  echo "Sending query: errors-and-critical"

                  aws sqs send-message \
                    --queue-url "https://sqs.us-east-1.amazonaws.com/351939435334/tenx-demo-cloud-retriever-query-queue" \
                    --message-body "$QUERY_BODY"

                  echo "Query sent successfully: errors-and-critical"

                  echo "All queries sent successfully for job: severity-filter"
              env:
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"
          imagePullSecrets:
            - name: ghcr-secret
