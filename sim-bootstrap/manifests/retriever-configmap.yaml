- apiVersion: v1
  data:
    00_tenx.conf: |
      <label @TENX>
        <match **>
          @type exec_filter
          child_respawn "-1"
          command "/opt/tenx-edge/bin/tenx-edge run @run/input/forwarder/fluentd/optimize/config.yaml @apps/edge/optimizer"
          tag "tenx-stdout"
          @label @TENX-STDOUT
          <format>
            @type "json"
          </format>
          <parse>
            @type "none"
          </parse>
        </match>
      </label>
      <label @TENX-STDOUT>
        <match **>
          @type stdout
        </match>
      </label>
      <source>
        @type unix
        path "/tmp/tenx_fluentd.sock"
        @label @TENX-PHASE-2
      </source>
      <label @TENX-PHASE-2>
        <match tenx-template>
          @type relabel
          @label @TENX-TEMPLATE
        </match>
        <match tenx-stdout>
          @type relabel
          @label @TENX-STDOUT
        </match>
        <match **>
          @type relabel
          @label @TENX-PROCESSED
        </match>
      </label>
    01_sources.conf: |
      <source>
        @type tail
        @id in_tail_otel_demo
        @label @KUBERNETES
        path /var/log/containers/*_otel-demo_*.log
        exclude_path ["/var/log/containers/*_otel-demo_tenx-*.log"]
        pos_file /var/log/fluentd-otel-demo.pos
        tag kubernetes.*
        read_from_head true
        <parse>
          @type multi_format
          <pattern>
            format json
            keep_time_key false
          </pattern>
          <pattern>
            format regexp
            expression /^(?<time>.+) (?<stream>stdout|stderr)( (.))? (?<log>.*)$/
            time_format '%Y-%m-%dT%H:%M:%S.%NZ'
            keep_time_key false
          </pattern>
        </parse>
      </source>
    01_tenx_sources.conf: |-
      <source>
        @type tail
        @id in_tail_tenx_internal_logs
        @label @TENX-INTERNAL
        path /var/log/tenx/*.log
        pos_file /var/log/tenx-internal.log.pos
        tag tenx-internal.*
        <parse>
          @type none
        </parse>
      </source>
    02_filters.conf: |-
      <label @KUBERNETES>
        <match kubernetes.var.log.containers.fluentd**>
          @type relabel
          @label @FLUENT_LOG
        </match>

        # <match kubernetes.var.log.containers.**_kube-system_**>
        #   @type null
        #   @id ignore_kube_system_logs
        # </match>

        <filter kubernetes.**>
          @type kubernetes_metadata
          @id filter_kube_metadata
          skip_labels false
          skip_container_metadata false
          skip_namespace_metadata true
          skip_master_url true
        </filter>

        <match **>
          @type relabel
          @label @DISPATCH
        </match>
      </label>
    03_dispatch.conf: |-
      <label @DISPATCH>
        <filter **>
          @type prometheus
          <metric>
            name fluentd_input_status_num_records_total
            type counter
            desc The total number of incoming records
            <labels>
              tag ${tag}
              hostname ${hostname}
            </labels>
          </metric>
        </filter>

        <match **>
          @type relabel
          @label @OUTPUT
        </match>
      </label>
    04_outputs.conf: |-
      <label @OUTPUT>
        <match **>
          @type relabel
          @label @TENX
        </match>
      </label>
    05_tenx_processed.conf: |-
      <label @TENX-PROCESSED>
        <match **>
          @type relabel
          @label @FINAL-OUTPUT
        </match>
      </label>
    06_final_output.conf: |-
      <label @FINAL-OUTPUT>
        <match **>
          @type null
        </match>
      </label>
    07_tenx_templates.conf: |-
      <label @TENX-TEMPLATE>
        <match **>
          @type null
        </match>
      </label>
    08_tenx_internal.conf: |-
      <label @TENX-INTERNAL>
        <match **>
          @type null
        </match>
      </label>
